name: Android Package

on:
  push:
    branches:
      - master
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    name: Build APKs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: "17"
          cache: gradle

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager --install "platforms;android-36.1" "build-tools;36.0.0" "platform-tools"

      - name: Configure release signing
        env:
          KEYSTORE: ${{ secrets.KEYSTORE }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [[ -n "${KEYSTORE:-}" && -n "${STORE_PASSWORD:-}" && -n "${KEY_PASSWORD:-}" ]]; then
            ./generate-keystore-config.sh
          else
            echo "Release signing secrets are not configured; release APK will be unsigned."
          fi

      - name: Build
        run: ./gradlew lintRelease assembleDebug assembleRelease --no-daemon --stacktrace

      - name: Collect APKs
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk dist/TrustMeAlready-debug.apk
          release_apk="$(find app/build/outputs/apk/release -maxdepth 1 -name '*.apk' | head -n 1)"
          cp "${release_apk}" dist/TrustMeAlready-release.apk

      - name: Upload debug APK
        uses: actions/upload-artifact@v7
        with:
          name: TrustMeAlready-debug
          path: dist/TrustMeAlready-debug.apk

      - name: Upload release APK
        uses: actions/upload-artifact@v7
        with:
          name: TrustMeAlready-release
          path: dist/TrustMeAlready-release.apk

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" dist/*.apk --clobber \
            || gh release create "${GITHUB_REF_NAME}" dist/*.apk --generate-notes
